<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxifly App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="screen-splash" class="screen active" onclick="showScreen('screen-login')">
        <div class="logo-container">
            <div class="globe-icon">🌐</div>
            <h1>FLUXIFLY</h1>
        </div>
    </div>

    <div id="screen-login" class="screen">
        <div class="logo-small">🌐 FLUXIFLY</div>
        <div class="login-box">
            <input type="text" placeholder="Nome de usuário">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Senha">
            <input type="password" placeholder="Confirme a senha">
            <button class="btn-entrar" onclick="showScreen('screen-home')">ENTRAR</button>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <header>
            <h2>Fluxifly app <span class="reload">↻</span> <span class="menu">☰</span></h2>
            <input type="text" class="search-bar" placeholder="🔍 Buscar...">
        </header>

        <div class="main-options">
            <div class="opt-card" onclick="showScreen('screen-estoque')">
                <div class="icon">📦</div>
                <p>Estoque atual</p>
            </div>
            <div class="opt-card" onclick="showScreen('screen-alertas')">
                <div class="icon-alert">!</div>
                <p>Alertas</p>
            </div>
        </div>

        <h3>Botões principais</h3>
        <div class="grid-buttons">
            <button class="btn-grid green" onclick="showScreen('screen-entrada')">
                <span class="arrow">←</span> Entrada
            </button>
            <button class="btn-grid red" onclick="showScreen('screen-saida')">
                <span class="arrow">→</span> Saída
            </button>
            <button class="btn-grid blue">📋 Inventário</button>
            <button class="btn-grid blue">🔍 Escaner</button>
        </div>
    </div>

    <div id="screen-estoque" class="screen">
        <header><button onclick="showScreen('screen-home')">←</button> Estoque</header>
        <div class="content">
            <h3>Estoque atual</h3>
            <canvas id="meuGrafico"></canvas>
        </div>
    </div>

    <div id="screen-alertas" class="screen">
        <header><button onclick="showScreen('screen-home')">←</button> Alertas</header>
        <div class="content">
            <h4>• Itens com excesso</h4>
            <table class="alert-table">
                <tr><th>Código</th><th>Produto</th><th>Qtde</th></tr>
                <tr><td>P001</td><td>Produto A</td><td>150</td></tr>
                <tr><td>P002</td><td>Produto B</td><td>200</td></tr>
            </table>
            <div class="warning-box">
                <div class="warning-icon">⚠️</div>
                <div class="warning-text">
                    <strong>Atenção</strong><br>Estoque acima do nível ideal
                </div>
            </div>
        </div>
    </div>

    <div id="screen-entrada" class="screen">
        <header><button onclick="showScreen('screen-home')">←</button> Entrada</header>
        <div class="form-container">
            <label>Produto:</label>
            <select><option>Selecione...</option></select>
            <label>Quantidade:</label>
            <input type="number">
            <label>Data de Validade:</label>
            <input type="date">
            <label>Fornecedor:</label>
            <select><option>Selecione...</option></select>
            <label>Lote:</label>
            <input type="text">
            <button class="btn-confirm" onclick="confirmAction('Entrada confirmada')">Confirmar</button>
        </div>
    </div>

    <div id="screen-saida" class="screen">
        <header><button onclick="showScreen('screen-home')">←</button> Saída</header>
        <div class="form-container">
            <label>Produto:</label>
            <select><option>Selecione...</option></select>
            <label>Quantidade:</label>
            <input type="number">
            <label>Destino:</label>
            <input type="text">
            <button class="btn-confirm" onclick="confirmAction('Saída confirmada')">Confirmar</button>
        </div>
    </div>

    <div id="overlay-confirm" class="overlay">
        <div class="success-circle">✓</div>
        <h2 id="confirm-msg">Ação Confirmada</h2>
        <button onclick="closeOverlay()">OK</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
