<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxifly App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="screen-splash" class="screen active">
        <div class="logo-container">
            <img src="logo-fluxifly.png" alt="Fluxifly Logo">
            <h1>FLUXIFLY</h1>
        </div>
    </section>

    <section id="screen-login" class="screen">
        <img src="logo-fluxifly.png" class="mini-logo">
        <h2>FLUXIFLY</h2>
        <input type="text" placeholder="Nome de usuário">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Senha">
        <input type="password" placeholder="Confirme a senha">
        <button class="btn-red" onclick="navigateTo('screen-home')">ENTRAR</button>
    </section>

    <section id="screen-home" class="screen">
        <header>
            <h1>Fluxifly app</h1>
            <div class="icons"><span>🔄</span> <span>☰</span></div>
        </header>
        <div class="search-bar"><input type="text" placeholder="🔍"></div>
        
        <div class="main-grid">
            <div class="card" onclick="navigateTo('screen-estoque')">📦 Estoque atual</div>
            <div class="card" onclick="navigateTo('screen-alertas')">⚠️ Alertas</div>
        </div>

        <div class="bottom-controls">
            <h3>Botões principais</h3>
            <div class="btn-grid">
                <button class="circle-btn green" onclick="navigateTo('screen-entrada')">⬅️ Entrada</button>
                <button class="circle-btn red" onclick="navigateTo('screen-saida')">➡️ Saída</button>
                <button class="circle-btn blue" onclick="navigateTo('screen-inventario')">📋 Inventário</button>
                <button class="circle-btn blue" onclick="navigateTo('screen-escaner')">🔲 Escaner</button>
            </div>
        </div>
    </section>

    <section id="screen-entrada" class="screen">
        <header><h2>Entrada</h2> <span onclick="navigateTo('screen-home')">☰</span></header>
        <div class="form">
            <label>Produto:</label> <select><option>Produto A</option></select>
            <label>Quantidade:</label> <input type="number" value="5">
            <button class="btn-confirm" onclick="confirmAction('entrada')">Confirmar</button>
        </div>
    </section>

    <section id="screen-success" class="screen">
        <div class="success-icon">✔️</div>
        <h2 id="success-text">Entrada confirmada</h2>
    </section>

    <script src="script.js"></script>
</body>
</html>
